name: Windows Release

on:
  push:
    tags:
      - "V*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag，例如 V1.0"
        required: true
        default: "V1.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Build EXE
        run: >
          pyinstaller --noconfirm --clean --windowed
          --name "li-zhi-badge-maker"
          --paths src
          --add-data "assets;assets"
          src/li_zhi_badge_maker/main.py

      - name: Archive app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist/li-zhi-badge-maker/*" -DestinationPath "release/li-zhi-badge-maker-win64.zip" -Force
          Compress-Archive -Path "examples/*" -DestinationPath "release/examples.zip" -Force

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.release_tag || github.ref_name }}
          allowUpdates: true
          artifacts: "release/*.zip"
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
